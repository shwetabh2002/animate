services:
  - type: web
    name: animate-web
    runtime: node
    region: oregon
    plan: free
    rootDir: web
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: false
